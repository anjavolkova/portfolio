<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#fdfcfd" />
<meta name="mobile-web-app-capable" content="yes" />
<title>anna volkova — designer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300&family=Inter:wght@400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: rgb(21,2,34);
    --muted: rgb(107,93,117);
    --muted-2: rgb(159,126,182);
    --bg: rgb(253,252,253);
    --card: rgb(255,255,255);
    --line: rgb(228,227,230);
    --line-soft: rgb(233,233,233);
    --dark: rgb(21,2,34);
    --accent: hsla(275, 11%, 41%, 1);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); font-family: "Inter", system-ui, sans-serif; }
  body { overflow-x: hidden; }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; border: 0; background: none; padding: 0; color: inherit; }

  .mono { font-family: "Space Mono", ui-monospace, monospace; letter-spacing: -0.06em; }
  .serif { font-family: "Fraunces", Georgia, serif; font-weight: 300; letter-spacing: -0.05em; }
  .italic { font-style: italic; }

  /* layout */
  .page { min-height: 100vh; }
  .header {
    position: sticky; top: 0; z-index: 40;
    height: 63px;
    background: rgba(253,252,253,0.6);
    backdrop-filter: blur(40px);
    -webkit-backdrop-filter: blur(40px);
    border-bottom: 1px solid rgba(228,227,230,0.9);
    display: flex; align-items: center;
    padding: 0 48px;
  }
  .header .brand {
    display: flex; align-items: center; gap: 12px;
    font-family: "Fraunces", serif; font-weight: 300; font-size: 28px; letter-spacing: -0.05em;
    color: var(--ink);
  }
  .header .brand .rule { width: 16px; height: 1px; background: var(--muted); }
  .header .brand .role { color: var(--muted); font-style: italic; letter-spacing: -0.035em; }
  .header .nav { margin-left: auto; display: flex; align-items: center; gap: 28px; }
  .header .nav a { color: var(--muted); font-family: "Space Mono", monospace; font-size: 15px; letter-spacing: -0.06em; transition: color .18s; }
  .header .nav a:hover, .header .nav a.active { color: var(--accent); }
  .btn-chat {
    background: var(--ink); color: #fff;
    border-radius: 12px;
    padding: 10px 16px; height: 44px;
    font-family: "Space Mono", monospace; font-size: 15px; letter-spacing: -0.06em;
    display: inline-flex; align-items: center; gap: 8px;
    transition: background .18s, transform .18s;
  }
  .btn-chat { background: var(--accent-ink, var(--ink)); }
  .btn-chat:hover { background: var(--accent); transform: translateY(-1px); }
  .btn-ghost {
    border: 1px solid var(--muted);
    color: var(--ink);
    border-radius: 12px;
    padding: 10px 16px; height: 44px;
    font-family: "Space Mono", monospace; font-size: 15px; letter-spacing: -0.06em;
    display: inline-flex; align-items: center; gap: 8px; background: transparent;
    transition: background .18s, color .18s;
  }
  .btn-ghost { border-color: var(--accent); color: var(--accent); }
  .btn-ghost:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

  .container { max-width: 1120px; margin: 0 auto; padding: 0 32px; }

  /* hero */
  .hero {
    padding: 160px 0 100px;
  }
  .hero-row { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 80px; align-items: start; }
  .hero h1 {
    font-family: "Fraunces", serif; font-weight: 400;
    font-size: 30px; line-height: 1.05; letter-spacing: -0.05em;
    color: var(--ink);
    margin: 0 0 12px;
  }
  .hero p.lede {
    font-family: "Fraunces", serif; font-weight: 300;
    font-size: 30px; line-height: 1.05; letter-spacing: -0.05em;
    color: var(--muted); margin: 0;
  }
  .hero .cv-list { display: flex; flex-direction: column; gap: 10px; margin-top: 8px; }
  .hero .cv-list .row { display: grid; grid-template-columns: 92px 1fr; gap: 16px; align-items: baseline; padding: 6px 0; border-bottom: 1px dashed rgba(107,93,117,.25); }
  .hero .cv-list .row:last-child { border-bottom: 0; }
  .hero .cv-list .when { color: var(--muted); font-family: "Space Mono", monospace; font-size: 13px; letter-spacing: -0.04em; }
  .hero .cv-list .what { color: var(--ink); font-family: "Inter", sans-serif; font-size: 17px; letter-spacing: -0.02em; }

  .hero .meta { display: flex; gap: 12px; margin-top: 28px; flex-wrap: wrap; }
  .chip {
    border: 1px solid var(--line);
    background: #fff;
    border-radius: 14px;
    padding: 10px 14px;
    min-width: 140px;
    display: flex; flex-direction: column; gap: 4px;
  }
  .chip .k { font-family: "Space Mono", monospace; font-size: 11px; letter-spacing: -0.04em; color: var(--muted); text-transform: uppercase; }
  .chip .v { font-family: "Inter", sans-serif; font-size: 14px; color: var(--ink); line-height: 1.3; white-space: pre-line; }

  /* section title */
  .label {
    font-family: "Space Mono", monospace; font-size: 15px; letter-spacing: -0.06em; color: var(--muted);
  }

  /* project cards */
  .projects { display: flex; flex-direction: column; gap: 96px; margin-top: 32px; }
  .project { display: grid; grid-template-columns: 1.3fr 1fr; gap: 48px; align-items: center; }
  .project.reverse { grid-template-columns: 1fr 1.3fr; }
  .project-media {
    position: relative;
    border-radius: 10px;
    border: 0.5px solid var(--ink);
    overflow: hidden;
    aspect-ratio: 622/360;
    background: #fff;
    cursor: pointer;
  }
  .project-media img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform .5s cubic-bezier(.2,.8,.2,1); }
  .project-media:hover img { transform: scale(1.03); }
  .project-media::after {
    content: "";
    position: absolute; inset: 0;
    background: linear-gradient(180deg, transparent 50%, rgba(21,2,34,0.08));
    opacity: 0; transition: opacity .2s;
  }
  .project-media:hover::after { opacity: 1; }
  .project-media .peek {
    position: absolute; left: 16px; bottom: 16px;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 6px 12px;
    font-family: "Space Mono", monospace; font-size: 12px; letter-spacing: -0.04em;
    color: var(--ink);
    opacity: 0; transform: translateY(6px);
    transition: opacity .25s, transform .25s;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .project-media:hover .peek { opacity: 1; transform: translateY(0); }

  .project-body .tag { font-family: "Space Mono", monospace; font-size: 14px; color: var(--muted); letter-spacing: -0.06em; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .project-body .tag .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); }
  .project-body h3 {
    font-family: "Fraunces", serif; font-weight: 300;
    font-size: 40px; line-height: 1.02; letter-spacing: -0.04em;
    color: var(--ink); margin: 0 0 16px;
  }
  .project-body p { font-size: 17px; line-height: 1.6; color: var(--muted); letter-spacing: -0.02em; margin: 0 0 24px; max-width: 46ch; }
  .read-more {
    background: var(--dark); color: #fff;
    border-radius: 12px; padding: 10px 16px; height: 44px;
    font-family: "Space Mono", monospace; font-size: 15px; letter-spacing: -0.06em;
    display: inline-flex; align-items: center; gap: 8px;
    transition: background .2s, transform .2s;
  }
  .read-more { background: var(--accent-deep, var(--dark)); }
  .read-more:hover { background: var(--accent); transform: translateY(-1px); }
  .read-more .arr { display: inline-block; transition: transform .2s; }
  .read-more:hover .arr { transform: translateX(3px); }

  .more-btn-wrap { display: flex; justify-content: center; padding: 72px 0; }

  /* fun grid */
  .fun-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 28px;
    margin-top: 32px;
  }
  .fun-card { cursor: pointer; }
  .fun-card .thumb {
    aspect-ratio: 267/168;
    border-radius: 8px;
    border: 1px solid var(--ink);
    background: var(--placeholder-bg, linear-gradient(135deg, #fdfcfd, #efe9f2));
    position: relative; overflow: hidden;
    transition: transform .3s cubic-bezier(.2,.8,.2,1), box-shadow .3s;
  }
  .fun-card:hover .thumb { transform: translateY(-4px); box-shadow: 0 12px 24px -12px rgba(21,2,34,.25); }
  .fun-card h4 {
    margin: 14px 0 4px;
    font-family: "Fraunces", serif; font-weight: 400;
    font-size: 19px; letter-spacing: -0.04em; color: var(--ink);
    line-height: 1.15;
  }
  .fun-card .status {
    font-family: "Inter", sans-serif; font-size: 13px; color: var(--muted); letter-spacing: -0.015em;
  }
  .fun-card .status::before { content: ""; display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--muted-2); margin-right: 6px; vertical-align: middle; }
  .fun-card .status.done::before { background: oklch(0.65 0.14 150); }

  /* CTA + footer */
  .cta {
    padding: 120px 0 60px;
  }
  .cta h2 {
    font-family: "Fraunces", serif; font-weight: 400;
    font-size: 32px; line-height: 1.05; letter-spacing: -0.05em; margin: 0 0 16px;
  }
  .cta .sub { color: var(--muted); font-family: "Space Mono", monospace; letter-spacing: -0.06em; font-size: 16px; margin-bottom: 28px; }

  .footer {
    border-top: 1px solid rgba(0,0,0,0.12);
    padding: 48px 0;
  }
  .footer-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
  .footer .copy { font-family: "Space Mono", monospace; font-size: 14px; color: var(--ink); letter-spacing: -0.02em; white-space: pre-line; }
  .footer .links { display: flex; gap: 8px; align-items: center; }
  .footer .pill {
    border: 1px solid var(--line-soft); border-radius: 40px;
    height: 55px; min-width: 55px; padding: 0 16px;
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    font-family: "Space Mono", monospace; font-size: 15px; color: var(--ink); letter-spacing: -0.015em;
    transition: background .2s, color .2s, border-color .2s;
  }
  .footer .pill:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  .footer .pill svg { width: 20px; height: 20px; stroke: currentColor; }

  /* decorative underline squiggle */
  .squiggle {
    position: absolute;
    width: 220px; height: 32px;
    pointer-events: none;
    opacity: 0.85;
  }

  /* case study overlay */
  .case-overlay {
    position: fixed; inset: 0;
    background: var(--bg);
    z-index: 100;
    overflow-y: auto;
    transform: translateY(24px);
    opacity: 0;
    pointer-events: none;
    transition: opacity .35s ease, transform .35s cubic-bezier(.2,.8,.2,1);
  }
  .case-overlay.open { transform: translateY(0); opacity: 1; pointer-events: auto; }
  .case-layout { display: grid; grid-template-columns: 280px 1fr; min-height: 100vh; }
  .case-sidebar {
    position: sticky; top: 63px; align-self: start;
    height: calc(100vh - 63px);
    padding: 48px 32px;
    display: flex; flex-direction: column; gap: 24px;
  }
  .case-sidebar .back {
    font-family: "Space Mono", monospace; font-size: 15px; letter-spacing: -0.06em;
    color: var(--muted);
    display: inline-flex; align-items: center; gap: 6px;
    transition: color .18s, transform .18s;
    align-self: flex-start;
  }
  .case-sidebar .back:hover { color: var(--ink); transform: translateX(-3px); }
  .case-sidebar nav { display: flex; flex-direction: column; gap: 6px; }
  .case-sidebar nav a {
    font-family: "Inter", sans-serif; font-size: 17px; letter-spacing: -0.02em;
    color: var(--muted);
    padding: 6px 0;
    display: flex; align-items: center; gap: 10px;
    transition: color .18s;
    position: relative;
  }
  .case-sidebar nav a .bullet { width: 6px; height: 1px; background: currentColor; opacity: .4; transition: width .2s, opacity .2s; }
  .case-sidebar nav a:hover { color: var(--ink); }
  .case-sidebar nav a.active { color: var(--ink); }
  .case-sidebar nav a.active .bullet { width: 18px; opacity: 1; background: var(--accent); }

  .case-main { padding: 48px 96px 160px; max-width: 960px; }
  .case-tag { font-family: "Space Mono", monospace; font-size: 15px; color: var(--muted); letter-spacing: -0.06em; }
  .case-title {
    font-family: "Fraunces", serif; font-weight: 300;
    font-size: 64px; line-height: 1.08; letter-spacing: -0.05em;
    margin: 8px 0 32px; color: var(--ink);
  }
  .hero-img {
    border-radius: 24px; background: #fff;
    border: 1px solid var(--line);
    box-shadow: 0 1px 3px rgba(16,24,40,.08), 0 1px 2px rgba(16,24,40,.05);
    padding: 24px;
    margin-bottom: 48px;
  }
  .hero-img img { width: 100%; display: block; mix-blend-mode: multiply; }

  .meta-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 56px; }
  .meta-row .cell { border-top: 1px solid var(--line); padding-top: 14px; }
  .meta-row .cell .k { font-family: "Space Mono", monospace; font-size: 12px; letter-spacing: -0.04em; color: var(--muted); text-transform: uppercase; margin-bottom: 4px; }
  .meta-row .cell .v { font-family: "Inter", sans-serif; font-size: 15px; color: var(--ink); line-height: 1.35; white-space: pre-line; }

  .case-section { margin-bottom: 72px; scroll-margin-top: 96px; }
  .case-section .kicker { font-family: "Space Mono", monospace; font-size: 15px; color: var(--muted); letter-spacing: -0.06em; margin-bottom: 16px; }
  .case-section h2 {
    font-family: "Fraunces", serif; font-weight: 300;
    font-size: 46px; line-height: 1; letter-spacing: -0.04em;
    margin: 0 0 28px; color: var(--ink);
  }
  .case-section p { font-size: 18px; line-height: 1.6; letter-spacing: -0.02em; color: var(--muted); margin: 0 0 16px; max-width: 62ch; }
  .case-section p strong { color: var(--ink); font-weight: 500; }

  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin: 32px 0; }
  .stat {
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 20px;
    background: #fff;
  }
  .stat .n { font-family: "Fraunces", serif; font-weight: 300; font-size: 54px; letter-spacing: -0.05em; line-height: 1; color: var(--ink); }
  .stat .l { font-family: "Space Mono", monospace; font-size: 13px; color: var(--muted); letter-spacing: -0.04em; margin-top: 10px; }

  .process-steps { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-top: 24px; }
  .step {
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 22px;
    background: #fff;
    transition: border-color .2s, transform .2s;
  }
  .step:hover { border-color: var(--accent); transform: translateY(-2px); }
  .step .num { font-family: "Space Mono", monospace; font-size: 12px; color: var(--accent); letter-spacing: -0.04em; margin-bottom: 8px; }
  .step h4 { margin: 0 0 6px; font-family: "Fraunces", serif; font-weight: 400; font-size: 22px; letter-spacing: -0.04em; color: var(--ink); }
  .step p { font-size: 15px; color: var(--muted); margin: 0; }

  /* chat modal */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(21,2,34,0.25);
    z-index: 200; opacity: 0; pointer-events: none;
    transition: opacity .25s;
    backdrop-filter: blur(6px);
  }
  .modal-backdrop.open { opacity: 1; pointer-events: auto; }
  .modal {
    position: fixed; z-index: 201;
    left: 50%; top: 50%; transform: translate(-50%, calc(-50% + 12px)) scale(0.98);
    width: 480px; max-width: calc(100vw - 32px);
    background: var(--bg);
    border-radius: 20px;
    border: 1px solid var(--line);
    box-shadow: 0 20px 60px -20px rgba(21,2,34,.35);
    padding: 28px;
    opacity: 0; pointer-events: none;
    transition: opacity .25s, transform .25s cubic-bezier(.2,.8,.2,1);
  }
  .modal.open { opacity: 1; transform: translate(-50%, -50%) scale(1); pointer-events: auto; }
  .modal h3 { font-family: "Fraunces", serif; font-weight: 300; font-size: 36px; letter-spacing: -0.05em; margin: 0 0 4px; line-height: 1; }
  .modal .sub { font-family: "Space Mono", monospace; font-size: 14px; color: var(--muted); letter-spacing: -0.06em; margin-bottom: 20px; }
  .modal .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
  .modal label { font-family: "Space Mono", monospace; font-size: 12px; color: var(--muted); letter-spacing: -0.04em; text-transform: uppercase; }
  .modal input, .modal textarea {
    border: 1px solid var(--line);
    background: #fff;
    border-radius: 10px;
    padding: 10px 12px;
    font-family: "Inter", sans-serif; font-size: 15px; color: var(--ink);
    letter-spacing: -0.01em;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  .modal input:focus, .modal textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px color-mix(in oklch, var(--accent) 20%, transparent);
  }
  .modal textarea { resize: vertical; min-height: 96px; }
  .modal .reasons { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
  .modal .reason {
    border: 1px solid var(--line); border-radius: 999px;
    padding: 6px 12px; font-family: "Space Mono", monospace; font-size: 13px; letter-spacing: -0.04em;
    color: var(--muted); background: #fff;
    transition: all .15s;
  }
  .modal .reason.on { background: var(--ink); color: #fff; border-color: var(--ink); }
  .modal .actions { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
  .modal .close { color: var(--muted); font-family: "Space Mono", monospace; font-size: 14px; letter-spacing: -0.06em; }
  .modal .close:hover { color: var(--ink); }
  .modal .sent { text-align: center; padding: 32px 8px; }
  .modal .sent .tick {
    width: 56px; height: 56px; border-radius: 50%;
    background: color-mix(in oklch, var(--accent) 22%, transparent);
    color: var(--ink);
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 28px;
    margin-bottom: 14px;
  }

  /* Tweaks panel */
  .tweaks {
    position: fixed; right: 20px; bottom: 20px; z-index: 150;
    background: #fff; border: 1px solid var(--line); border-radius: 14px;
    padding: 14px 16px;
    width: 260px;
    box-shadow: 0 10px 30px -10px rgba(21,2,34,.25);
    font-family: "Space Mono", monospace; font-size: 13px; letter-spacing: -0.04em;
    display: none;
  }
  .tweaks.show { display: block; }
  .tweaks .t-title { text-transform: uppercase; color: var(--muted); font-size: 11px; margin-bottom: 10px; }
  .tweaks .t-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .tweaks .swatches { display: flex; gap: 6px; }
  .tweaks .swatch { width: 22px; height: 22px; border-radius: 50%; border: 2px solid #fff; outline: 1px solid var(--line); cursor: pointer; }
  .tweaks .swatch.on { outline: 2px solid var(--ink); }

  /* =============== responsive =============== */

  /* tablet */
  @media (max-width: 900px) {
    .container { padding: 0 24px; }
    .hero { padding: 72px 0 56px; }
    .hero-row { grid-template-columns: 1fr; gap: 28px; }
    .project, .project.reverse { grid-template-columns: 1fr; gap: 20px; }
    .project.reverse > :first-child { order: -1; } /* media always first */
    .fun-grid { grid-template-columns: repeat(2, 1fr); gap: 20px; }
    .case-layout { grid-template-columns: 1fr; }
    .case-main { padding: 24px 24px 120px; max-width: 100%; }
    .case-title { font-size: 44px; }
    .case-section h2 { font-size: 32px; }
    .meta-row { grid-template-columns: repeat(2, 1fr); }
    .process-steps { grid-template-columns: 1fr; }
    .header { padding: 0 20px; }
    .header .nav { gap: 14px; }
    .cta { padding: 72px 0 40px; }
    .cta h2 { font-size: 40px; }
  }

  /* mobile */
  @media (max-width: 640px) {
    html, body { font-size: 16px; }
    .container { padding: 0 20px; }

    /* header: hide desktop nav, show hamburger */
    .header {
      height: 56px;
      padding: 0 16px;
      padding-top: env(safe-area-inset-top);
      height: calc(56px + env(safe-area-inset-top));
    }
    .header .brand { font-size: 22px; gap: 8px; }
    .header .brand .rule { width: 10px; }
    .header .brand .role { display: none; }
    .header .nav { display: none; }
    .header .mobile-toggle { display: inline-flex !important; }

    /* mobile menu panel */
    .mobile-menu {
      position: fixed;
      top: calc(56px + env(safe-area-inset-top));
      left: 0; right: 0;
      background: rgba(253,252,253,0.96);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--line);
      padding: 20px 20px calc(24px + env(safe-area-inset-bottom));
      display: flex; flex-direction: column; gap: 4px;
      z-index: 39;
      transform: translateY(-12px);
      opacity: 0; pointer-events: none;
      transition: opacity .22s, transform .22s cubic-bezier(.2,.8,.2,1);
    }
    .mobile-menu.open { opacity: 1; transform: translateY(0); pointer-events: auto; }
    .mobile-menu a, .mobile-menu button {
      display: block;
      width: 100%; text-align: left;
      padding: 14px 4px;
      font-family: "Space Mono", monospace; font-size: 18px; letter-spacing: -0.06em;
      color: var(--ink);
      border-bottom: 1px solid var(--line-soft);
    }
    .mobile-menu a:last-of-type { border-bottom: 0; }
    .mobile-menu .btn-chat {
      margin-top: 12px;
      width: 100%; height: 52px;
      justify-content: center;
      background: var(--ink); color: #fff;
      border-bottom: 0;
    }

    /* hero */
    .hero { padding: 40px 0 48px; }
    .hero h1 { font-size: 32px; }
    .hero p.lede { font-size: 22px; line-height: 1.15; }
    .hero-row { gap: 24px; }

    .hero .cv-list .row {
      grid-template-columns: 64px 1fr;
      gap: 12px;
      padding: 8px 0;
    }
    .hero .cv-list .when { font-size: 12px; }
    .hero .cv-list .what { font-size: 15px; }

    /* chips: horizontal scroll instead of wrap */
    .hero .meta {
      margin: 20px -20px 0;
      padding: 0 20px 6px;
      flex-wrap: nowrap;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .hero .meta::-webkit-scrollbar { display: none; }
    .chip { flex: 0 0 auto; min-width: 150px; scroll-snap-align: start; }

    /* projects */
    .projects { gap: 56px; margin-top: 20px; }
    .project-body h3 { font-size: 28px; line-height: 1.08; margin-bottom: 12px; }
    .project-body p { font-size: 16px; margin-bottom: 18px; max-width: none; }
    .project-body .tag { font-size: 13px; margin-bottom: 10px; }
    .project-media .peek { opacity: 1; transform: none; font-size: 11px; padding: 5px 10px; }
    .more-btn-wrap { padding: 40px 0 16px; }
    .btn-ghost { width: 100%; justify-content: center; }

    /* fun grid */
    .fun-grid { grid-template-columns: repeat(2, 1fr); gap: 14px; }
    .fun-card h4 { font-size: 16px; margin-top: 10px; }
    .fun-card .status { font-size: 12px; }

    /* cta */
    .cta { padding: 56px 0 28px; }
    .cta h2 { font-size: 32px; }
    .cta .sub { font-size: 14px; margin-bottom: 20px; }
    .cta .btn-chat { width: 100%; justify-content: center; }

    /* footer */
    .footer { padding: 32px 0 calc(32px + env(safe-area-inset-bottom)); }
    .footer-row { flex-direction: column; align-items: flex-start; gap: 20px; }
    .footer .copy { font-size: 12px; }
    .footer .links { width: 100%; gap: 6px; flex-wrap: wrap; }
    .footer .pill { height: 48px; min-width: 48px; padding: 0 14px; font-size: 14px; }

    /* case study overlay */
    .case-sidebar {
      position: sticky; top: 56px;
      height: auto; padding: 12px 16px;
      background: rgba(253,252,253,0.92);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--line);
      z-index: 20;
    }
    .case-sidebar .back { font-size: 13px; }
    .case-sidebar nav {
      flex-direction: row;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      scrollbar-width: none;
      margin: 10px -16px 0;
      padding: 0 16px 4px;
      gap: 14px;
    }
    .case-sidebar nav::-webkit-scrollbar { display: none; }
    .case-sidebar nav a {
      flex: 0 0 auto;
      font-size: 14px;
      padding: 6px 0;
      white-space: nowrap;
      scroll-snap-align: start;
      letter-spacing: -0.04em;
    }
    .case-sidebar nav a .bullet { display: none; }
    .case-sidebar nav a.active { border-bottom: 2px solid var(--accent); margin-bottom: -2px; }

    .case-main { padding: 24px 20px 100px; }
    .case-tag { font-size: 13px; }
    .case-title { font-size: 30px; margin: 8px 0 24px; line-height: 1.08; }

    .hero-img { padding: 12px; border-radius: 14px; margin-bottom: 32px; }
    .meta-row { grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 40px; }
    .meta-row .cell .v { font-size: 14px; }

    .case-section { margin-bottom: 48px; scroll-margin-top: 140px; }
    .case-section h2 { font-size: 24px; margin-bottom: 18px; line-height: 1.1; }
    .case-section p { font-size: 16px; line-height: 1.55; max-width: none; }
    .case-section .kicker { font-size: 13px; margin-bottom: 10px; }

    .stats { grid-template-columns: 1fr; gap: 12px; margin: 24px 0; }
    .stat { padding: 16px; }
    .stat .n { font-size: 42px; }
    .step { padding: 18px; }
    .step h4 { font-size: 18px; }
    .process-steps { gap: 12px; }

    /* modal -> bottom sheet */
    .modal {
      left: 0; right: 0; bottom: 0; top: auto;
      width: 100%; max-width: 100%;
      border-radius: 20px 20px 0 0;
      transform: translateY(24px);
      padding: 24px 20px calc(24px + env(safe-area-inset-bottom));
      max-height: 92vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .modal.open { transform: translateY(0); }
    .modal::before {
      content: "";
      display: block;
      width: 40px; height: 4px; border-radius: 2px;
      background: var(--line);
      margin: -4px auto 14px;
    }
    .modal h3 { font-size: 28px; }
    .modal .reasons { gap: 6px; margin-bottom: 14px; }
    .modal .reason { padding: 8px 12px; font-size: 13px; }
    .modal input, .modal textarea { font-size: 16px; padding: 12px; } /* 16px avoids iOS zoom */
    .modal .actions { gap: 12px; }
    .modal .actions .btn-chat { flex: 1; height: 48px; justify-content: center; }
    .modal .actions .close { padding: 14px 4px; }
  }

  /* very small screens */
  @media (max-width: 380px) {
    .hero h1 { font-size: 28px; }
    .hero p.lede { font-size: 20px; }
    .case-title { font-size: 26px; }
    .cta h2 { font-size: 28px; }
  }

  /* respect reduced-motion */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }

  /* mobile menu (hidden by default, shown inside mobile media query) */
  .mobile-menu { display: none; }

  /* hide mobile-toggle by default on desktop */
  .mobile-toggle {
    display: none;
    width: 44px; height: 44px;
    margin-left: auto;
    align-items: center; justify-content: center;
    color: var(--ink);
    border-radius: 10px;
    transition: background .18s;
  }
  .mobile-toggle:hover { background: var(--line-soft); }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" data-presets="react" src="app.jsx"></script>
</body>
</html>
